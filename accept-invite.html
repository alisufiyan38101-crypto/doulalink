<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #FFF0F4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      background: white;
      max-width: 450px;
      width: 100%;
      padding: 40px 32px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      margin-bottom: 24px;
    }
    .logo-circle {
      width: 64px;
      height: 64px;
      background: #F4698A;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: 0 8px 20px rgba(244, 105, 138, 0.25);
    }
    .logo-circle svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1C1C1E;
      margin-bottom: 8px;
    }
    .sub {
      color: #9A9AA0;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(244, 105, 138, 0.2);
      border-top-color: #F4698A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .inviter-card {
      background: #FFF0F4;
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
    }
    .inviter-label {
      font-size: 12px;
      color: #9A9AA0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .inviter-name {
      font-size: 22px;
      font-weight: 800;
      color: #F4698A;
    }

    .field {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1C1C1E;
      margin-bottom: 6px;
    }

    .name-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .name-row .field {
      flex: 1;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #EDE0E4;
      border-radius: 14px;
      font-size: 15px;
      background: #F7F0F2;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #F4698A;
      background: white;
    }
    input[readonly] {
      background: #F0F0F0;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #F4698A;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 4px 14px rgba(244, 105, 138, 0.3);
    }
    button:hover {
      background: #e05578;
    }

    .error {
      background: #FFEBEE;
      color: #c0392b;
      padding: 12px;
      border-radius: 14px;
      margin: 16px 0;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: #F0FBF3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg {
      width: 40px;
      height: 40px;
      stroke: #34C759;
      stroke-width: 2;
    }
    .store-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .store-btn {
      flex: 1;
      background: #1C1C1E;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 28px 20px; }
      .name-row { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p>Loading your invitation...</p>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const app = document.getElementById('app');

  async function verifyInvite() {
    if (!token) {
      app.innerHTML = '<div class="error">❌ No invitation token found.</div>';
      return;
    }

    try {
      const { data, error } = await sb
        .from('invites')
        .select('*')
        .eq('token', token);

      if (error || !data || data.length === 0) {
        app.innerHTML = '<div class="error">❌ Invalid or expired invitation link.</div>';
        return;
      }

      const invite = data[0];

      if (invite.accepted_at) {
        app.innerHTML = '<div class="error">✅ This invitation has already been accepted.<br><a href="/login">Go to Login</a></div>';
        return;
      }

      if (new Date(invite.expires_at) < new Date()) {
        app.innerHTML = '<div class="error">⏰ This invitation has expired.</div>';
        return;
      }

      // Show signup form
      const nameParts = (invite.invited_name || '').split(' ');
      const firstName = nameParts[0] || '';
      const lastName = nameParts.slice(1).join(' ') || '';

      app.innerHTML = `
        <div class="logo">
          <div class="logo-circle">
            <svg viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </div>
        </div>
        <h1>Create Your Account</h1>
        <p class="sub">Join DoulaLink to start your care journey.</p>

        <div class="inviter-card">
          <div class="inviter-label">Invited by</div>
          <div class="inviter-name">${escapeHtml(invite.inviter_name || 'Your Care Team')}</div>
        </div>

        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="First name" value="${escapeHtml(firstName)}">
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Last name" value="${escapeHtml(lastName)}">
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="email" value="${escapeHtml(invite.invited_email || '')}" readonly>
        </div>

        <div class="field">
          <label>Create Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters">
        </div>

        <button id="createBtn">Join DoulaLink →</button>
      `;

      document.getElementById('createBtn').onclick = () => createAccount(token);

    } catch (err) {
      app.innerHTML = '<div class="error">❌ Something went wrong. Please try again.</div>';
    }
  }

  async function createAccount(inviteToken) {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    if (!fname) { alert('Please enter your first name.'); return; }
    if (!lname) { alert('Please enter your last name.'); return; }
    if (!password || password.length < 8) { alert('Password must be at least 8 characters.'); return; }

    app.innerHTML = '<div class="spinner"></div><p>Creating your account...</p>';

    try {
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: fname,
            last_name: lname,
            full_name: `${fname} ${lname}`
          }
        }
      });
      if (authError) throw authError;

      await sb.from('invites')
        .update({ accepted_at: new Date().toISOString() })
        .eq('token', inviteToken);

      app.innerHTML = `
        <div class="success-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>You're connected! 🎉</h1>
        <p class="sub">Your account has been created.</p>
        <div style="background: #F0FBF3; border-radius: 16px; padding: 16px; margin: 16px 0;">
          <p style="font-weight: 600; color: #27ae60;">✅ Now connected to your care team</p>
        </div>
        <p style="font-size: 14px; color: #9A9AA0; margin-bottom: 16px;">
          Check your email to verify your account.
        </p>
        <a href="/login" style="display: block; background: #F4698A; color: white; padding: 14px; border-radius: 50px; text-decoration: none; font-weight: 600;">Open App →</a>
        
        <p style="font-size: 13px; color: #9A9AA0; margin-top: 16px;">Don't have the app yet?</p>
        <div class="store-row">
          <a href="https://apps.apple.com/app/doulalink" class="store-btn">🍎 App Store</a>
          <a href="https://play.google.com/store/apps/details?id=com.doulalink.app" class="store-btn">▶ Google Play</a>
        </div>
      `;

    } catch (err) {
      let msg = err.message || 'Failed to create account.';
      if (msg.toLowerCase().includes('already registered')) {
        msg = 'An account with this email already exists. Please sign in instead.';
      }
      app.innerHTML = `<div class="error">❌ ${msg}</div><button onclick="location.reload()">Try Again</button>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  verifyInvite();
</script>
</body>
</html>
