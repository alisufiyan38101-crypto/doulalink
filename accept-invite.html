<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FFF0F4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .card {
      background: white;
      max-width: 450px;
      width: 100%;
      padding: 40px 32px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      text-align: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #F4698A20;
      border-top-color: #F4698A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: #FFEBEE;
      color: #c0392b;
      padding: 12px;
      border-radius: 14px;
      margin: 16px 0;
    }
    .success {
      background: #E8F8F0;
      color: #2e7d32;
      padding: 12px;
      border-radius: 14px;
      margin: 16px 0;
    }
    .inviter-name {
      font-size: 22px;
      font-weight: 800;
      color: #F4698A;
      margin: 16px 0;
    }
    .field {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1C1C1E;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #EDE0E4;
      border-radius: 14px;
      font-size: 15px;
      background: #F7F0F2;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #F4698A;
      background: white;
    }
    input[readonly] {
      background: #F0F0F0;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #F4698A;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }
    .name-row {
      display: flex;
      gap: 12px;
    }
    .name-row .field {
      flex: 1;
    }
    @media (max-width: 480px) {
      .name-row {
        flex-direction: column;
        gap: 16px;
      }
      .card {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p>Verifying your invitation...</p>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const app = document.getElementById('app');

  async function verifyAndAccept() {
    // Step 1: Check token
    if (!token) {
      app.innerHTML = '<div class="error">❌ No invitation token found. Please use the link from your email.</div>';
      return;
    }

    try {
      // Step 2: Query database (NO .single())
      const { data, error } = await sb
        .from('invites')
        .select('*')
        .eq('token', token);

      console.log('Query result:', { data, error });

      // Step 3: Check if invite exists
      if (error || !data || data.length === 0) {
        app.innerHTML = '<div class="error">❌ Invalid invitation link. Please request a new one.</div>';
        return;
      }

      const invite = data[0];

      // Step 4: Check if already accepted
      if (invite.accepted_at) {
        app.innerHTML = '<div class="error">✅ This invitation has already been accepted.<br><a href="/login" style="color:#F4698A;">Go to Login →</a></div>';
        return;
      }

      // Step 5: Check expiry
      if (new Date(invite.expires_at) < new Date()) {
        app.innerHTML = '<div class="error">⏰ This invitation has expired. Please ask for a new one.</div>';
        return;
      }

      // Step 6: Token is VALID! Show signup form
      const nameParts = (invite.invited_name || '').split(' ');
      const firstName = nameParts[0] || '';
      const lastName = nameParts.slice(1).join(' ') || '';

      app.innerHTML = `
        <h2>✨ You're Invited!</h2>
        <div class="inviter-name">${escapeHtml(invite.inviter_name || 'Your Care Team')}</div>
        <p style="color:#666; margin-bottom: 20px;">has invited you to join DoulaLink</p>

        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="First name" value="${escapeHtml(firstName)}">
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Last name" value="${escapeHtml(lastName)}">
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="email" value="${escapeHtml(invite.invited_email || '')}" readonly>
        </div>

        <div class="field">
          <label>Create Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters">
        </div>

        <button id="createBtn">Create Account & Connect →</button>
      `;

      document.getElementById('createBtn').onclick = () => createAccount(token);

    } catch (err) {
      console.error('Error:', err);
      app.innerHTML = '<div class="error">❌ Something went wrong. Please try again.</div>';
    }
  }

  async function createAccount(inviteToken) {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    // Validation
    if (!fname) { alert('Please enter your first name'); return; }
    if (!lname) { alert('Please enter your last name'); return; }
    if (password.length < 8) { alert('Password must be at least 8 characters'); return; }

    // Show loading
    app.innerHTML = '<div class="spinner"></div><p>Creating your account...</p>';

    try {
      // Create auth user
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: fname,
            last_name: lname,
            full_name: `${fname} ${lname}`
          }
        }
      });

      if (authError) throw authError;

      // Mark invite as accepted
      const { error: updateError } = await sb
        .from('invites')
        .update({ 
          accepted_at: new Date().toISOString(),
          accepted_by: authData.user?.id
        })
        .eq('token', inviteToken);

      if (updateError) console.error('Update error:', updateError);

      // Show success
      app.innerHTML = `
        <div style="font-size: 64px; margin: 20px 0;">🎉</div>
        <h2>You're Connected!</h2>
        <p style="color: #666; margin: 16px 0;">Your account has been created successfully.</p>
        <div class="success">✅ You are now connected on DoulaLink</div>
        <p style="margin-top: 20px; font-size: 14px; color: #666;">Check your email to verify your account.</p>
        <a href="/login" style="display: inline-block; margin-top: 16px; color: #F4698A; text-decoration: none;"><strong>Continue to Login →</strong></a>
      `;

    } catch (err) {
      let msg = err.message || 'Failed to create account';
      if (msg.includes('already registered')) {
        msg = 'An account with this email already exists. Please sign in instead.';
      }
      app.innerHTML = `<div class="error">❌ ${msg}</div><button onclick="location.reload()">Try Again</button>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Start
  verifyAndAccept();
</script>
</body>
</html>
