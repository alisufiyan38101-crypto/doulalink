<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rose: #F4698A;
      --rose-dark: #e05578;
      --rose-pale: #FFF0F4;
      --bg: #FFF0F4;
      --ink: #1C1C1E;
      --sub: #555558;
      --muted: #9A9AA0;
      --border: #EDE0E4;
      --input-bg: #F7F0F2;
      --white: #ffffff;
      --green: #34C759;
      --green-pale: #F0FBF3;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #FDE8ED 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-circle {
      width: 64px;
      height: 64px;
      background: var(--rose);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(244, 105, 138, 0.25);
    }
    .logo-circle svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(244, 105, 138, 0.2);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .inviter-card {
      background: var(--rose-pale);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
    }
    .inviter-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .inviter-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--rose);
    }

    .field {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
    }

    /* ✅ FIXED: Name row - no overflow */
    .name-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .name-row .field {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .input-wrapper {
      width: 100%;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: var(--input-bg);
      transition: all 0.2s ease;
      color: var(--ink);
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: var(--rose);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(244, 105, 138, 0.1);
    }
    input::placeholder {
      color: var(--muted);
    }
    input[readonly] {
      background: #F0F0F0;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--rose);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 16px;
      box-shadow: 0 4px 14px rgba(244, 105, 138, 0.3);
    }
    button:hover {
      background: var(--rose-dark);
      transform: translateY(-1px);
    }

    .error {
      background: #FFEBEE;
      color: #c0392b;
      padding: 12px;
      border-radius: 14px;
      margin: 16px 0;
      font-size: 14px;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--green-pale);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--green);
      stroke-width: 2;
    }
    .store-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .store-btn {
      flex: 1;
      background: var(--ink);
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }
    .store-btn:hover {
      opacity: 0.85;
    }
    a {
      color: var(--rose);
      text-decoration: none;
    }

    /* ✅ FIXED: Mobile responsive - column on small screens */
    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      .card {
        padding: 28px 20px;
      }
      .name-row {
        flex-direction: column;
        gap: 16px;
      }
      .name-row .field {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p style="color: var(--muted);">Loading your invitation...</p>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const app = document.getElementById('app');

  let inviteData = null;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function verifyInvite() {
    if (!token) {
      app.innerHTML = '<div class="error">❌ No invitation token found. Please use the link from your email.</div>';
      return;
    }

    try {
      const { data, error } = await sb
        .from('invites')
        .select('*')
        .eq('token', token);

      if (error || !data || data.length === 0) {
        app.innerHTML = '<div class="error">❌ Invalid or expired invitation link.</div>';
        return;
      }

      const invite = data[0];
      inviteData = invite;

      if (invite.accepted_at) {
        app.innerHTML = `<div class="error">✅ This invitation has already been accepted. <a href="/login">Go to Login</a></div>`;
        return;
      }

      if (new Date(invite.expires_at) < new Date()) {
        app.innerHTML = '<div class="error">⏰ This invitation has expired. Please ask for a new one.</div>';
        return;
      }

      const inviterName = escapeHtml(invite.inviter_name || 'Your Care Team');
      const invitedEmail = escapeHtml(invite.invited_email || '');
      const invitedName = invite.invited_name || '';
      const nameParts = invitedName.split(' ');
      const firstName = nameParts[0] || '';
      const lastName = nameParts.slice(1).join(' ') || '';

      app.innerHTML = `
        <div class="logo">
          <div class="logo-circle">
            <svg viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </div>
        </div>
        <h1>Create Your Account</h1>
        <p class="sub">Join DoulaLink to start your care journey.</p>

        <div class="inviter-card">
          <div class="inviter-label">Invited by</div>
          <div class="inviter-name">${inviterName}</div>
        </div>

        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <div class="input-wrapper">
              <input type="text" id="fname" placeholder="First name" value="${escapeHtml(firstName)}">
            </div>
          </div>
          <div class="field">
            <label>Last Name</label>
            <div class="input-wrapper">
              <input type="text" id="lname" placeholder="Last name" value="${escapeHtml(lastName)}">
            </div>
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" value="${invitedEmail}" placeholder="your@email.com" readonly>
          </div>
        </div>

        <div class="field">
          <label>Create Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Minimum 8 characters">
          </div>
        </div>

        <button id="createBtn">Join DoulaLink →</button>
      `;

      document.getElementById('createBtn').addEventListener('click', () => createAccount(token));

    } catch (err) {
      console.error('Verification error:', err);
      app.innerHTML = '<div class="error">❌ Something went wrong. Please try again.</div>';
    }
  }

  async function createAccount(inviteToken) {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    if (!fname) { alert('Please enter your first name.'); return; }
    if (!lname) { alert('Please enter your last name.'); return; }
    if (!password || password.length < 8) { alert('Password must be at least 8 characters.'); return; }

    app.innerHTML = '<div class="spinner"></div><p>Creating your account...</p>';

    try {
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: fname,
            last_name: lname,
            full_name: `${fname} ${lname}`
          }
        }
      });
      if (authError) throw authError;

      await sb.from('invites')
        .update({ 
          accepted_at: new Date().toISOString(),
          accepted_by: authData.user?.id
        })
        .eq('token', inviteToken);

      app.innerHTML = `
        <div class="success-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>You're connected! 🎉</h1>
        <p class="sub">Your account has been created.</p>
        <div style="background: var(--green-pale); border-radius: 16px; padding: 16px; margin: 16px 0;">
          <p style="font-weight: 600; color: #27ae60;">✅ Now connected to ${escapeHtml(inviteData?.inviter_name || 'your care team')}</p>
        </div>
        <p style="font-size: 14px; color: var(--muted); margin-bottom: 16px;">
          Check your email to verify your account, then open the app.
        </p>
        <a href="/login" style="display: block; background: var(--rose); color: white; padding: 14px; border-radius: 50px; text-decoration: none; font-weight: 600; margin-bottom: 16px;">Open App →</a>
        
        <p style="font-size: 13px; color: var(--muted);">Don't have the app yet?</p>
        <div class="store-row">
          <a href="https://apps.apple.com/app/doulalink" class="store-btn">🍎 App Store</a>
          <a href="https://play.google.com/store/apps/details?id=com.doulalink.app" class="store-btn">▶ Google Play</a>
        </div>
      `;

    } catch (err) {
      console.error('Signup error:', err);
      let msg = err.message || 'Failed to create account.';
      if (msg.toLowerCase().includes('already registered')) {
        msg = 'An account with this email already exists. Please sign in instead.';
      }
      app.innerHTML = `<div class="error">❌ ${msg}</div><button onclick="location.reload()">Try Again</button>`;
    }
  }

  verifyInvite();
</script>
</body>
</html>
