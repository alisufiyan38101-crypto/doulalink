<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif; background: #FFF0F4;
      min-height: 100vh; display: flex; justify-content: center;
      align-items: center; padding: 20px;
    }
    .card {
      background: white; max-width: 450px; width: 100%;
      padding: 40px 32px; border-radius: 32px; text-align: center;
      box-shadow: 0 20px 60px rgba(244,105,138,0.15);
    }
    .spinner {
      width: 48px; height: 48px; border: 3px solid #F4698A20;
      border-top-color: #F4698A; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 20px auto; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #FFEBEE; color: #c0392b; padding: 15px; border-radius: 16px; margin: 16px 0; }
    .success { background: #E8F8F0; color: #2e7d32; padding: 20px; border-radius: 20px; margin: 24px 0; }
    button {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #F4698A, #E55A73);
      color: white; border: none; border-radius: 50px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: white; color: #F4698A; border: 2px solid #F4698A; }
    .btn-login {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      margin-top: 12px;
      font-size: 15px;
    }
    input {
      width: 100%; padding: 14px; border: 2px solid #EDE0E4;
      border-radius: 12px; font-size: 16px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #F4698A; }
    input[readonly] { background: #f5f5f5; cursor: not-allowed; }
    .field { margin-bottom: 16px; text-align: left; }
    label { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-bottom: 8px; display: block; }
    .name-row { display: flex; gap: 16px; }
    .name-row .field { flex: 1; }
    @media (max-width: 480px) { .name-row { flex-direction: column; gap: 0; } }
    .info-box {
      background: #FFF0F4; border: 1.5px solid rgba(244,105,138,0.2);
      padding: 14px 16px; border-radius: 16px; margin-bottom: 20px;
      text-align: left; font-size: 14px; color: #555; line-height: 1.5;
    }
    .info-box strong { color: #F4698A; }
    .divider {
      text-align: center; margin: 24px 0;
      color: #999; position: relative; font-size: 14px;
    }
    .divider::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: #EDE0E4;
    }
    .divider span { background: white; padding: 0 16px; }
    h2 { margin-bottom: 8px; font-size: 22px; color: #1C1C1E; }
    p { color: #666; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p style="margin-top:20px">Verifying invitation...</p>
</div>

<script>
  const SUPABASE_URL  = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';

  const sb        = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const urlParams = new URLSearchParams(window.location.search);
  const token     = urlParams.get('token');
  const appDiv    = document.getElementById('app');

  /* ── Helpers ── */
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function showError(message) {
    appDiv.innerHTML = `
      <div style="font-size:64px">❌</div>
      <h2>Invitation Error</h2>
      <div class="error">${escapeHtml(message)}</div>
      <p>Please contact the person who invited you for a new link.</p>
      <button onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Go to Homepage</button>
    `;
  }

  function showSuccess(inviterName, userName) {
    appDiv.innerHTML = `
      <div style="font-size:64px">🎉</div>
      <h2>Successfully Connected!</h2>
      <div class="success">✅ Welcome ${escapeHtml(userName)}! You are now connected with <strong>${escapeHtml(inviterName)}</strong></div>
      <p>You can now share updates, messages, and track progress together.</p>
      <button onclick="window.location.href='/'">Go to Dashboard</button>
    `;
  }

  /* ── Accept invitation ── */
  async function acceptInvitation(inviteId) {
    const { error } = await sb
      .from('invitations')
      .update({ status: 'accepted', updated_at: new Date().toISOString() })
      .eq('id', inviteId);
    return !error;
  }

  /* ── Create connection ── */
  async function createConnection(userIdA, userIdB) {
    if (!userIdA || !userIdB || userIdA === userIdB) {
      console.warn('⚠️ createConnection skipped — missing or same IDs:', { userIdA, userIdB });
      return;
    }

    const [userA, userB] = userIdA < userIdB ? [userIdA, userIdB] : [userIdB, userIdA];

    const { data: existing } = await sb
      .from('connected_users')
      .select('id')
      .eq('user_a', userA)
      .eq('user_b', userB)
      .maybeSingle();

    if (!existing) {
      const { error } = await sb.from('connected_users').insert({
        user_a: userA,
        user_b: userB,
        connected_at: new Date().toISOString()
      });
      if (error) {
        console.error('❌ createConnection insert error:', error);
      } else {
        console.log('✅ Connection created between', userA, 'and', userB);
      }
    } else {
      console.log('ℹ️ Connection already exists');
    }
  }

  /* ── Signup form for new users ── */
  function showSignupForm(invite, inviterUserId) {
    const nameParts   = (invite.invited_name || '').split(' ');
    const firstName   = nameParts[0] || '';
    const lastName    = nameParts.slice(1).join(' ') || '';
    const roleDisplay = invite.type === 'professional' ? 'Professional' : 'Family Member';

    appDiv.innerHTML = `
      <div style="font-size:56px">✨</div>
      <h2 style="margin-bottom:16px">Create Your Account</h2>
      <div class="info-box">
        <strong>${escapeHtml(invite.inviter_name || 'Someone')}</strong> (${escapeHtml(invite.inviter_role || 'User')})<br>
        has invited you to join as a <strong>${escapeHtml(roleDisplay)}</strong>
      </div>
      <div id="formError" class="error" style="display:none;"></div>
      <div class="name-row">
        <div class="field">
          <label>First Name *</label>
          <input type="text" id="firstName" placeholder="First name" value="${escapeHtml(firstName)}" />
        </div>
        <div class="field">
          <label>Last Name *</label>
          <input type="text" id="lastName" placeholder="Last name" value="${escapeHtml(lastName)}" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailField" value="${escapeHtml(invite.invited_email)}" readonly />
      </div>
      <div class="field">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" />
      </div>
      <div class="field">
        <label>Confirm Password *</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" />
      </div>
      <button id="signupBtn" onclick="submitSignup('${escapeHtml(invite.invited_email)}', '${escapeHtml(invite.id)}', '${escapeHtml(invite.type)}', '${escapeHtml(invite.inviter_name)}', '${escapeHtml(inviterUserId || '')}')">
        Create Account & Accept Invitation
      </button>

      <div class="divider"><span>or</span></div>

      <button class="btn-login" onclick="showLoginForm('${escapeHtml(invite.invited_email)}', '${escapeHtml(invite.id)}', '${escapeHtml(invite.inviter_name)}', '${escapeHtml(inviterUserId || '')}')">
        Already have an account? Login
      </button>
    `;
  }

  /* ── Login form ── */
  function showLoginForm(invitedEmail, inviteId, inviterName, inviterUserId) {
    appDiv.innerHTML = `
      <div style="font-size:56px">🔐</div>
      <h2 style="margin-bottom:16px">Login to Accept Invitation</h2>
      <div class="info-box">
        <strong>${escapeHtml(inviterName || 'Someone')}</strong> invited you.<br>
        Login with your account to accept the invitation.
      </div>
      <div id="loginError" class="error" style="display:none;"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" value="${escapeHtml(invitedEmail)}" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>
      <button id="loginBtn" onclick="submitLogin('${escapeHtml(inviteId)}', '${escapeHtml(inviterName)}', '${escapeHtml(inviterUserId || '')}')">
        Login & Accept Invitation
      </button>
      <button class="btn-secondary" onclick="showSignupFormFromLogin('${escapeHtml(invitedEmail)}', '${escapeHtml(inviteId)}', '${escapeHtml(inviterName)}', '${escapeHtml(inviterUserId || '')}')" style="margin-top:12px">
        Don't have an account? Sign up
      </button>
    `;
  }

  function showSignupFormFromLogin(invitedEmail, inviteId, inviterName, inviterUserId) {
    const invite = { invited_email: invitedEmail, id: inviteId, inviter_name: inviterName };
    showSignupForm(invite, inviterUserId);
  }

  async function submitLogin(inviteId, inviterName, inviterUserId) {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errDiv   = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) {
      errDiv.textContent = 'Please enter email and password.';
      errDiv.style.display = 'block';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Logging in...';
    errDiv.style.display = 'none';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      console.log('✅ Login success. User ID:', data.user.id);
      console.log('Inviter ID:', inviterUserId);

      await acceptInvitation(inviteId);

      if (inviterUserId && data.user?.id) {
        await createConnection(data.user.id, inviterUserId);
      }

      const { data: profile } = await sb
        .from('profiles')
        .select('full_name')
        .eq('id', data.user.id)
        .single();

      showSuccess(inviterName, profile?.full_name || data.user.email);

    } catch (err) {
      console.error('Login error:', err);
      btn.disabled    = false;
      btn.textContent = 'Login & Accept Invitation';
      errDiv.textContent   = err.message || 'Login failed. Please check your credentials.';
      errDiv.style.display = 'block';
    }
  }

  async function submitSignup(invitedEmail, inviteId, inviteType, inviterName, inviterUserId) {
    const fn   = document.getElementById('firstName').value.trim();
    const ln   = document.getElementById('lastName').value.trim();
    const pwd  = document.getElementById('password').value;
    const cpwd = document.getElementById('confirmPassword').value;
    const errDiv = document.getElementById('formError');

    const showFormError = (msg) => { errDiv.textContent = msg; errDiv.style.display = 'block'; };

    if (!fn || !ln)     { showFormError('Please enter your first and last name.'); return; }
    if (pwd.length < 8) { showFormError('Password must be at least 8 characters.'); return; }
    if (pwd !== cpwd)   { showFormError('Passwords do not match.'); return; }

    errDiv.style.display = 'none';
    const btn = document.getElementById('signupBtn');
    btn.disabled    = true;
    btn.textContent = 'Creating account...';

    try {
      const { data: authData, error: signUpError } = await sb.auth.signUp({
        email: invitedEmail,
        password: pwd,
        options: {
          data: {
            first_name: fn,
            last_name:  ln,
            full_name:  `${fn} ${ln}`,
            role: inviteType === 'professional' ? 'professional' : 'parent'
          }
        }
      });

      if (signUpError) throw signUpError;

      console.log('✅ Signup success. New user ID:', authData?.user?.id);
      console.log('Inviter ID:', inviterUserId);

      // Wait for DB trigger to create profile
      await new Promise(r => setTimeout(r, 2500));

      await acceptInvitation(inviteId);

      if (inviterUserId && authData?.user?.id) {
        await createConnection(authData.user.id, inviterUserId);
      }

      showSuccess(inviterName, `${fn} ${ln}`);

    } catch (err) {
      console.error('Signup error:', err);
      btn.disabled    = false;
      btn.textContent = 'Create Account & Accept Invitation';
      document.getElementById('formError').textContent    = err.message || 'Something went wrong.';
      document.getElementById('formError').style.display = 'block';
    }
  }

  /* ── Main flow ── */
  async function verifyAndAccept() {
    if (!token) { showError('No invitation token found in the link.'); return; }

    try {
      const { data: invite, error: inviteError } = await sb
        .from('invitations')
        .select('*')
        .eq('token', token)
        .maybeSingle();

      if (inviteError) { showError('System error. Please try again later.'); return; }
      if (!invite)     { showError('Invalid or expired invitation link.'); return; }

      if (new Date(invite.expires_at) < new Date()) {
        showError('This invitation has expired.');
        return;
      }

      if (invite.status !== 'pending') {
        showError(`This invitation has already been ${invite.status}.`);
        return;
      }

      // ✅ FIX: Use inviter_id directly from the invite row (no email lookup needed)
      // Fallback: if old invite has no inviter_id, try invited_by column, else email lookup
      let inviterUserId = invite.inviter_id || invite.invited_by || null;

      if (!inviterUserId && invite.inviter_email) {
        // Fallback for old invites that don't have inviter_id saved
        console.warn('⚠️ No inviter_id found, falling back to email lookup...');
        const { data: profile } = await sb
          .from('profiles')
          .select('id')
          .eq('email', invite.inviter_email)
          .maybeSingle();
        inviterUserId = profile?.id || null;
      }

      console.log('Inviter User ID resolved:', inviterUserId);

      showSignupForm(invite, inviterUserId);

    } catch (err) {
      console.error('Unexpected error:', err);
      showError('Something went wrong. Please try again.');
    }
  }

  verifyAndAccept();
</script>
</body>
</html>
