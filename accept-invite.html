<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#FFF0F4;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .card{background:white;max-width:450px;width:100%;padding:40px 32px;border-radius:32px;text-align:center}
    .spinner{width:48px;height:48px;border:3px solid #F4698A20;border-top-color:#F4698A;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{background:#FFEBEE;color:#c0392b;padding:12px;border-radius:14px;margin:16px 0}
    .success{background:#E8F8F0;color:#2e7d32;padding:12px;border-radius:14px;margin:16px 0}
    .warning{background:#FFF8E1;color:#E6A700;padding:12px;border-radius:14px;margin:16px 0}
    .inviter-name{font-size:22px;font-weight:800;color:#F4698A;margin:16px 0}
    .field{margin-bottom:16px;text-align:left}
    label{display:block;font-size:13px;font-weight:600;color:#1C1C1E;margin-bottom:6px}
    input{width:100%;padding:14px 16px;border:1.5px solid #EDE0E4;border-radius:14px;font-size:15px;background:#F7F0F2}
    input:focus{outline:none;border-color:#F4698A;background:white}
    input[readonly]{background:#F0F0F0}
    button{width:100%;padding:16px;background:#F4698A;color:white;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}
    .btn-secondary{background:white;color:#F4698A;border:2px solid #F4698A}
    .name-row{display:flex;gap:12px}
    .name-row .field{flex:1}
    @media (max-width:480px){.name-row{flex-direction:column;gap:16px}}
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p>Verifying your invitation...</p>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const app = document.getElementById('app');

  let inviteData = null;

  async function verifyInvite() {
    if (!token) {
      app.innerHTML = '<div class="error">❌ No invitation token found.</div>';
      return;
    }

    try {
      const { data, error } = await sb
        .from('invites')
        .select('*')
        .eq('token', token);

      if (error || !data || data.length === 0) {
        app.innerHTML = '<div class="error">❌ Invalid or expired invitation link.</div>';
        return;
      }

      const invite = data[0];
      inviteData = invite;

      if (invite.accepted_at) {
        app.innerHTML = `<div class="success">✅ Already accepted. <a href="/login">Go to Login →</a></div>`;
        return;
      }

      if (new Date(invite.expires_at) < new Date()) {
        app.innerHTML = '<div class="error">⏰ This invitation has expired.</div>';
        return;
      }

      // ✅ Check if user already exists
      const { data: existingUser } = await sb
        .from('profiles')
        .select('id, email')
        .eq('email', invite.invited_email)
        .maybeSingle();

      if (existingUser) {
        // ✅ CASE 2: Existing User - Show Sign In
        app.innerHTML = `
          <div style="font-size:48px; margin-bottom:16px;">👋</div>
          <h2>Welcome Back!</h2>
          <div class="warning">An account already exists with <strong>${escapeHtml(invite.invited_email)}</strong></div>
          <div class="inviter-name">${escapeHtml(invite.inviter_name || 'Your Care Team')}</div>
          <p style="color:#666; margin-bottom:20px;">Sign in to accept this invitation and get connected.</p>
          <div class="field">
            <label>Password</label>
            <input type="password" id="existingPassword" placeholder="Enter your password">
          </div>
          <button id="existingLoginBtn">Sign In & Connect →</button>
          <a href="/signup" style="display:block; margin-top:12px; color:#F4698A;">Don't have access? Create new account</a>
        `;
        document.getElementById('existingLoginBtn').onclick = () => handleExistingUserLogin(token, invite.invited_email);
        return;
      }

      // ✅ CASE 1: New User - Show Signup Form
      const nameParts = (invite.invited_name || '').split(' ');
      const firstName = nameParts[0] || '';
      const lastName = nameParts.slice(1).join(' ') || '';

      app.innerHTML = `
        <h2>✨ You're Invited!</h2>
        <div class="inviter-name">${escapeHtml(invite.inviter_name || 'Your Care Team')}</div>
        <p style="color:#666; margin-bottom:20px;">has invited you to join DoulaLink</p>

        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="First name" value="${escapeHtml(firstName)}">
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Last name" value="${escapeHtml(lastName)}">
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="email" value="${escapeHtml(invite.invited_email)}" readonly>
        </div>

        <div class="field">
          <label>Create Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters">
        </div>

        <button id="createBtn">Create Account & Connect →</button>
      `;

      document.getElementById('createBtn').onclick = () => createNewAccount(token);

    } catch (err) {
      console.error('Error:', err);
      app.innerHTML = '<div class="error">❌ Something went wrong.</div>';
    }
  }

  // ✅ New User: Create account and accept invite
  async function createNewAccount(inviteToken) {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    if (!fname) { alert('First name required'); return; }
    if (!lname) { alert('Last name required'); return; }
    if (password.length < 8) { alert('Password must be 8+ characters'); return; }

    app.innerHTML = '<div class="spinner"></div><p>Creating your account...</p>';

    try {
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { first_name: fname, last_name: lname, full_name: `${fname} ${lname}` }
        }
      });
      if (authError) throw authError;

      // Accept the invite
      await sb.from('invites')
        .update({ accepted_at: new Date().toISOString(), accepted_by: authData.user?.id })
        .eq('token', inviteToken);

      // Show success screen
      showConnectedScreen(inviteData?.inviter_name || 'your care team');

    } catch (err) {
      let msg = err.message;
      if (msg.includes('already registered')) {
        app.innerHTML = `
          <div class="warning">⚠️ Account already exists</div>
          <button id="retryLoginBtn">Sign In Instead →</button>
        `;
        document.getElementById('retryLoginBtn').onclick = () => {
          window.location.href = `/login?email=${encodeURIComponent(email)}&redirect_token=${inviteToken}`;
        };
      } else {
        app.innerHTML = `<div class="error">❌ ${msg}</div><button onclick="location.reload()">Try Again</button>`;
      }
    }
  }

  // ✅ Existing User: Login and accept invite
  async function handleExistingUserLogin(inviteToken, email) {
    const password = document.getElementById('existingPassword').value;

    if (!password) {
      alert('Please enter your password');
      return;
    }

    app.innerHTML = '<div class="spinner"></div><p>Signing in...</p>';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Accept the invite
      await sb.from('invites')
        .update({ accepted_at: new Date().toISOString(), accepted_by: data.user?.id })
        .eq('token', inviteToken);

      // Show success screen
      showConnectedScreen(inviteData?.inviter_name || 'your care team');

    } catch (err) {
      app.innerHTML = `
        <div class="error">❌ ${err.message}</div>
        <button onclick="location.reload()">Try Again</button>
        <a href="/signup" style="display:block; margin-top:12px; color:#F4698A;">Create new account</a>
      `;
    }
  }

  // ✅ Show Connected Screen (Same for both new and existing user)
  function showConnectedScreen(inviterName) {
    app.innerHTML = `
      <div style="color:#34C759; font-size:48px; margin:20px;">✓</div>
      <h2>You're Connected! 🎉</h2>
      <p style="color:#666; margin:10px 0;">You are now connected with <strong>${escapeHtml(inviterName)}</strong> on DoulaLink.</p>
      <div class="success">✅ Invitation accepted successfully!</div>
      <button id="openAppBtn">Open App →</button>
      <p style="margin-top:16px; font-size:13px; color:#999;">Don't have the app?</p>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <a href="https://apps.apple.com/app/doulalink" style="flex:1; background:#1C1C1E; color:white; text-decoration:none; padding:12px; border-radius:50px; font-size:13px;">🍎 App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.doulalink.app" style="flex:1; background:#1C1C1E; color:white; text-decoration:none; padding:12px; border-radius:50px; font-size:13px;">▶ Google Play</a>
      </div>
    `;
    document.getElementById('openAppBtn').onclick = () => {
      // Redirect to app or home page
      window.location.href = '/';
    };
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  verifyInvite();
</script>
</body>
</html>
