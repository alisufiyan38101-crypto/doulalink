<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoulaLink — Create Account</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #F4698A; --rose-dark: #e05578; --rose-pale: #FFF0F4;
      --bg: #FFF0F4; --ink: #1C1C1E; --sub: #555558; --muted: #9A9AA0;
      --border: #EDE0E4; --input-bg: #F7F0F2; --white: #ffffff;
      --green: #34C759; --green-pale: #F0FBF3;
    }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; padding: 48px 20px 40px;
    }

    .top-logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px; animation: fadeDown .5s ease both;
    }
    .logo-circle {
      width: 64px; height: 64px; background: var(--rose); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; box-shadow: 0 8px 24px rgba(244,105,138,.35);
    }
    .logo-circle svg { width: 30px; height: 30px; fill: #fff; }
    .logo-name { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -.4px; }
    .logo-tagline { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .card {
      background: var(--white); border-radius: 28px;
      box-shadow: 0 8px 40px rgba(244,105,138,.10), 0 2px 8px rgba(0,0,0,.04);
      width: 100%; max-width: 400px; padding: 32px 28px 36px;
      animation: riseUp .5s cubic-bezier(.22,1,.36,1) .1s both;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes riseUp  { from{opacity:0;transform:translateY(24px) scale(.98)} to{opacity:1;transform:none} }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* Loading */
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid rgba(244,105,138,.2); border-top-color: var(--rose);
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Icon ring */
    .icon-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--rose-pale); border: 2px solid rgba(244,105,138,.25);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    }
    .icon-ring svg { width: 30px; height: 30px; stroke: var(--rose); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-ring.green { background: var(--green-pale); border-color: rgba(52,199,89,.25); }
    .icon-ring.green svg { stroke: var(--green); }

    .card-heading { font-size: 24px; font-weight: 800; color: var(--ink); margin-bottom: 6px; text-align: center; letter-spacing: -.3px; }
    .card-sub { font-size: 13.5px; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.55; }

    .inviter-box {
      background: var(--rose-pale); border: 1.5px solid rgba(244,105,138,.25);
      border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 24px;
    }
    .inviter-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
    .inviter-name { font-size: 20px; font-weight: 800; color: var(--ink); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .name-row { display: flex; gap: 12px; }
    .name-row .field { flex: 1; }

    .input-wrap {
      display: flex; align-items: center; background: var(--input-bg);
      border: 1.5px solid var(--border); border-radius: 16px; padding: 0 16px;
      height: 52px; transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,105,138,.12); background: #fff;
    }
    .input-wrap svg {
      width: 18px; height: 18px; stroke: var(--muted); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; margin-right: 10px;
    }
    .input-wrap input {
      flex: 1; border: none; background: transparent;
      font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--ink); outline: none;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .eye-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; line-height: 0; transition: color .2s; }
    .eye-btn:hover { color: var(--rose); }
    .eye-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .error-box {
      background: #FFF0F2; border: 1.5px solid rgba(244,105,138,.35); border-radius: 14px;
      padding: 12px 14px; font-size: 13.5px; color: #c0392b; margin-bottom: 18px;
      display: none; align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; animation: shake .3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    .btn-primary {
      width: 100%; height: 54px; background: var(--rose); color: #fff;
      border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(244,105,138,.4); margin-top: 4px;
      transition: background .2s, transform .15s; text-decoration: none;
    }
    .btn-primary:hover:not(:disabled) { background: var(--rose-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }

    /* Connected success box */
    .connected-box {
      background: var(--green-pale); border: 2px solid rgba(52,199,89,.3);
      border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 24px;
    }
    .connected-name { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .connected-label { font-size: 13px; color: #27ae60; font-weight: 600; }

    .store-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-dark {
      flex: 1; height: 48px; background: var(--ink); color: #fff;
      border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none; transition: opacity .2s, transform .15s;
    }
    .btn-dark:hover { opacity: .85; transform: translateY(-1px); }

    @media (max-width: 480px) { body { padding: 36px 16px 32px; } .card { padding: 26px 20px 30px; } }
  </style>
</head>
<body>

  <div class="top-logo">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div class="logo-name">DoulaLink</div>
    <div class="logo-tagline">You've been invited! 🎉</div>
  </div>

  <div class="card">

    <!-- Loading screen -->
    <div class="screen active" id="s-loading">
      <div class="spinner"></div>
      <p style="text-align:center;color:var(--muted);font-size:14px;">Loading your invitation…</p>
    </div>

    <!-- Signup form screen -->
    <div class="screen" id="s-signup">
      <div class="card-heading">Create Your Account</div>
      <div class="card-sub">You've been invited to join DoulaLink.</div>

      <div class="inviter-box">
        <div class="inviter-label">Invited by</div>
        <div class="inviter-name" id="inviter-display">—</div>
      </div>

      <div class="error-box" id="signup-err">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="signup-err-msg"></span>
      </div>

      <div class="name-row">
        <div class="field">
          <label>First Name</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="fname" placeholder="First" />
          </div>
        </div>
        <div class="field">
          <label>Last Name</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="lname" placeholder="Last" />
          </div>
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="inv-email" placeholder="your@email.com" />
        </div>
      </div>

      <div class="field">
        <label>Create Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="inv-pw" placeholder="Minimum 8 characters" />
          <button class="eye-btn" onclick="togglePw()" type="button">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span id="signup-label">Join DoulaLink</span>
        <div class="btn-spinner" id="signup-spinner"></div>
      </button>
    </div>

    <!-- Success screen -->
    <div class="screen" id="s-success">
      <div class="icon-ring green">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="card-heading">You're connected! 🎉</div>
      <div class="card-sub">Your account has been created.</div>

      <div class="connected-box">
        <div class="connected-label">✅ Now connected to</div>
        <div class="connected-name" id="success-inviter">—</div>
        <p style="font-size:13px;color:#27ae60;margin-top:6px;">Open the app to get started.</p>
      </div>

      <a href="doulalink://invite-accepted" class="btn-primary">Open App →</a>

      <p style="margin-top:18px;text-align:center;font-size:13px;color:var(--muted);">Don't have the app yet?</p>
      <div class="store-row">
        <a href="https://apps.apple.com/app/doulalink" class="btn-dark">🍎 App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.doulalink.app" class="btn-dark">▶ Google Play</a>
      </div>
    </div>

  </div>

<script>
  const SUPABASE_URL  = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let inviteToken = null;
  let inviteData  = null;

  function show(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function togglePw() {
    const inp = document.getElementById('inv-pw');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    inviteToken = params.get('token');

    // Safety net: if someone lands here without going through verify-invite first
    if (!inviteToken) {
      window.location.href = 'verify-invite.html';
      return;
    }

    const { data, error } = await sb
      .from('invites')
      .select('*')
      .eq('token', inviteToken)
      .single();

    if (error || !data || (data.expires_at && new Date(data.expires_at) < new Date())) {
      window.location.href = `verify-invite.html?token=${encodeURIComponent(inviteToken)}`;
      return;
    }

    if (data.accepted_at) {
      window.location.href = `already-connected.html?inviter=${encodeURIComponent(data.inviter_name || 'your care team')}`;
      return;
    }

    inviteData = data;
    document.getElementById('inviter-display').textContent = data.inviter_name || 'Your Care Team';
    if (data.invited_email) document.getElementById('inv-email').value = data.invited_email;
    if (data.invited_name) {
      const parts = data.invited_name.split(' ');
      document.getElementById('fname').value = parts[0] || '';
      document.getElementById('lname').value = parts.slice(1).join(' ') || '';
    }
    show('s-signup');
  }

  async function handleSignup() {
    const errEl  = document.getElementById('signup-err');
    const errMsg = document.getElementById('signup-err-msg');
    errEl.classList.remove('show');

    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('inv-email').value.trim().toLowerCase();
    const pw    = document.getElementById('inv-pw').value;

    if (!fname)                      { errMsg.textContent = 'Please enter your first name.'; errEl.classList.add('show'); return; }
    if (!lname)                      { errMsg.textContent = 'Please enter your last name.'; errEl.classList.add('show'); return; }
    if (!email || !email.includes('@')) { errMsg.textContent = 'Please enter a valid email.'; errEl.classList.add('show'); return; }
    if (!pw || pw.length < 8)        { errMsg.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return; }

    // Set loading state
    document.getElementById('signup-btn').disabled = true;
    document.getElementById('signup-label').style.display = 'none';
    document.getElementById('signup-spinner').style.display = 'block';

    try {
      // 1. Create the Supabase auth account
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password: pw,
        options: {
          data: {
            first_name: fname,
            last_name: lname,
            full_name: `${fname} ${lname}`,
            role: inviteData?.invite_type || 'parent',
            family_id: inviteData?.family_id
          }
        }
      });
      if (authError) throw authError;

      // 2. Mark the invite as accepted
      await sb.from('invites')
        .update({ accepted_at: new Date().toISOString() })
        .eq('token', inviteToken);

      // 3. Link the new user's profile to the family
      if (inviteData?.family_id && authData?.user?.id) {
        await sb.from('profiles')
          .update({ family_id: inviteData.family_id })
          .eq('id', authData.user.id);
      }

      // 4. Show success
      const inviterName = inviteData?.inviter_name || 'your care team';
      document.getElementById('success-inviter').textContent = inviterName;
      show('s-success');

    } catch (err) {
      let msg = err.message || 'Failed to create account. Please try again.';
      if (msg.toLowerCase().includes('already registered')) {
        msg = 'An account with this email already exists. Please sign in instead.';
      }
      errMsg.textContent = msg;
      errEl.classList.add('show');
      document.getElementById('signup-btn').disabled = false;
      document.getElementById('signup-label').style.display = 'inline';
      document.getElementById('signup-spinner').style.display = 'none';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  init();
</script>
</body>
</html>
