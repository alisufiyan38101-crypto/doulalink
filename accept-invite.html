<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Invite — DoulaLink</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#FFF0F4;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{background:white;max-width:450px;width:100%;padding:40px 32px;border-radius:32px;text-align:center;box-shadow:0 20px 60px rgba(244,105,138,0.15)}
        .spinner{width:48px;height:48px;border:3px solid #F4698A20;border-top-color:#F4698A;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error{background:#FFEBEE;color:#c0392b;padding:15px;border-radius:16px;margin:16px 0}
        .success{background:#E8F8F0;color:#2e7d32;padding:20px;border-radius:20px;margin:24px 0}
        button{width:100%;padding:18px;background:linear-gradient(135deg,#F4698A,#E55A73);color:white;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}
        .btn-secondary{background:white;color:#F4698A;border:2px solid #F4698A}
        input{width:100%;padding:14px;border:2px solid #EDE0E4;border-radius:12px;font-size:16px;margin-bottom:16px;box-sizing:border-box}
        input:focus{outline:none;border-color:#F4698A}
        .field{margin-bottom:16px;text-align:left}
        label{font-size:14px;font-weight:600;color:#1C1C1E;margin-bottom:8px;display:block}
        .name-row{display:flex;gap:16px}
        .name-row .field{flex:1}
        @media (max-width:480px){.name-row{flex-direction:column;gap:20px}}
        .hidden{display:none}
        .info-box{background:#F0F4FF;padding:12px;border-radius:12px;margin-bottom:20px;text-align:left;font-size:14px}
        .info-box strong{color:#F4698A}
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="spinner"></div>
    <p style="margin-top:20px">Verifying invitation...</p>
</div>

<script>
    const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const type = urlParams.get('type');
    const appDiv = document.getElementById('app');

    console.log('Token:', token);
    console.log('Type:', type);

    async function verifyAndAccept() {
        if (!token) {
            showError('No invitation token found in the link');
            return;
        }

        try {
            // Using maybeSingle() instead of single() to avoid "no rows" error
            const { data: invite, error: inviteError } = await supabaseClient
                .from('invitations')
                .select('*')
                .eq('token', token)
                .maybeSingle();

            console.log('Invite data:', invite);
            console.log('Error:', inviteError);

            // Check if invite exists
            if (!invite) {
                console.log('No invite found for token:', token);
                showError('Invalid or expired invitation link. Please request a new invitation.');
                return;
            }

            if (inviteError) {
                console.error('Database error:', inviteError);
                showError('System error. Please try again later.');
                return;
            }

            // Check if expired
            const expiresAt = new Date(invite.expires_at);
            const now = new Date();
            
            if (expiresAt < now) {
                showError('This invitation has expired. Please ask for a new invitation link.');
                return;
            }

            // Check status
            if (invite.status !== 'pending') {
                if (invite.status === 'accepted') {
                    showError('This invitation has already been accepted. You can login to your account.');
                } else if (invite.status === 'declined') {
                    showError('This invitation was declined. Please contact the inviter for a new link.');
                } else {
                    showError(`This invitation has already been ${invite.status}.`);
                }
                return;
            }

            // Check if user already exists with this email
            const { data: existingUser, error: userError } = await supabaseClient
                .from('profiles')
                .select('id, email, first_name, last_name')
                .eq('email', invite.invited_email)
                .maybeSingle();

            if (existingUser) {
                // User already exists - just accept the invitation
                console.log('Existing user found:', existingUser);
                
                // ✅ FIXED: No invited_user_id column
                const { error: updateError } = await supabaseClient
                    .from('invitations')
                    .update({ 
                        status: 'accepted', 
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', invite.id);

                if (updateError) {
                    console.error('Update error:', updateError);
                    showError('Failed to accept invitation. Please try again.');
                    return;
                }

                showSuccess(invite.inviter_name, `${existingUser.first_name} ${existingUser.last_name}`, true);
            } else {
                // New user - show signup form
                showSignupForm(invite);
            }

        } catch (err) {
            console.error('Unexpected error:', err);
            showError('Something went wrong. Please try again or contact support.');
        }
    }

    function showSignupForm(invite) {
        // Extract name from invited_name or use empty strings
        const nameParts = (invite.invited_name || '').split(' ');
        const firstName = nameParts[0] || '';
        const lastName = nameParts.slice(1).join(' ') || '';

        // Determine display role
        const roleDisplay = invite.type === 'professional' ? 'Professional' : 'Family Member';

        appDiv.innerHTML = `
            <div style="font-size:56px">✨</div>
            <h2>Create Your Account</h2>
            <div class="info-box">
                <strong>${escapeHtml(invite.inviter_name || 'Someone')}</strong> (${invite.inviter_role || 'User'})<br>
                has invited you to join as a <strong>${roleDisplay}</strong>
            </div>
            
            <form id="signupForm">
                <div class="name-row">
                    <div class="field">
                        <label>First Name *</label>
                        <input type="text" id="firstName" placeholder="First name" value="${escapeHtml(firstName)}" required>
                    </div>
                    <div class="field">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" placeholder="Last name" value="${escapeHtml(lastName)}" required>
                    </div>
                </div>
                
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" value="${escapeHtml(invite.invited_email)}" readonly style="background:#f5f5f5">
                </div>
                
                <div class="field">
                    <label>Password *</label>
                    <input type="password" id="password" placeholder="Create a password (min. 6 characters)" required>
                </div>
                
                <div class="field">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" id="signupBtn">Create Account & Accept Invitation</button>
                <button type="button" class="btn-secondary" onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Cancel</button>
            </form>
        `;

        const form = document.getElementById('signupForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!firstName || !lastName) {
                alert('Please enter your first and last name');
                return;
            }

            if (!password || password.length < 6) {
                alert('Please create a password with at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                // Sign up the user
                const { data: authData, error: signUpError } = await supabaseClient.auth.signUp({
                    email: invite.invited_email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            role: invite.type === 'professional' ? 'professional' : 'parent'
                        }
                    }
                });

                if (signUpError) throw signUpError;

                if (!authData.user) {
                    throw new Error('Failed to create user account');
                }

                // Wait a moment for the profile to be created by database trigger
                await new Promise(resolve => setTimeout(resolve, 2000));

                // ✅ FIXED: No invited_user_id column
                const { error: updateError } = await supabaseClient
                    .from('invitations')
                    .update({ 
                        status: 'accepted', 
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', invite.id);

                if (updateError) {
                    console.error('Failed to update invitation:', updateError);
                    // Still show success but log error
                }

                showSuccess(invite.inviter_name, `${firstName} ${lastName}`, false);

            } catch (err) {
                console.error('Signup error:', err);
                alert('Error creating account: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Create Account & Accept Invitation';
            }
        };
    }

    function showSuccess(inviterName, userName, isExistingUser) {
        const message = isExistingUser 
            ? `${escapeHtml(userName)} is now connected with <strong>${escapeHtml(inviterName)}</strong>`
            : `Welcome ${escapeHtml(userName)}! You are now connected with <strong>${escapeHtml(inviterName)}</strong>`;

        appDiv.innerHTML = `
            <div style="font-size:64px">🎉</div>
            <h2>Successfully Connected!</h2>
            <div class="success">
                ✅ ${message}
            </div>
            <p style="margin:16px 0;color:#666;">You can now share updates, messages, and track progress together.</p>
            <button onclick="handleOpenApp()">Open App</button>
            <button class="btn-secondary" style="margin-top:12px" onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Continue to Web</button>
        `;
    }

    function showError(message) {
        appDiv.innerHTML = `
            <div style="font-size:64px">❌</div>
            <h2>Invitation Error</h2>
            <div class="error">${escapeHtml(message)}</div>
            <p style="color:#666; margin-top:16px;">Please contact the person who invited you for a new link.</p>
            <button onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Go to Homepage</button>
        `;
    }

    function handleOpenApp() {
        // Try to open the mobile app first
        window.location.href = 'doulalink://app';
        
        // Fallback to web after 2 seconds if app doesn't open
        setTimeout(() => {
            window.location.href = 'https://doulalink.doulalink-web.workers.dev';
        }, 2000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Start verification
    verifyAndAccept();
</script>
</body>
</html>
