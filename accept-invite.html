<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invite — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#FFF0F4;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .card{background:white;max-width:450px;width:100%;padding:40px 32px;border-radius:32px;text-align:center;box-shadow:0 20px 60px rgba(244,105,138,0.15)}
    .spinner{width:48px;height:48px;border:3px solid #F4698A20;border-top-color:#F4698A;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{background:#FFEBEE;color:#c0392b;padding:20px;border-radius:20px;margin:24px 0;border-left:5px solid #EF4444;font-weight:500}
    .success{background:#E8F8F0;color:#2e7d32;padding:20px;border-radius:20px;margin:24px 0;border-left:5px solid #10B981;font-weight:500}
    button{width:100%;padding:20px;background:linear-gradient(135deg,#F4698A,#E55A73);color:white;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;margin-top:24px}
    button:disabled{opacity:0.6;cursor:not-allowed}
    input{width:100%;padding:14px;border:2px solid #EDE0E4;border-radius:12px;font-size:16px;margin-bottom:16px}
    input:focus{outline:none;border-color:#F4698A}
    .field{margin-bottom:16px;text-align:left}
    label{font-size:14px;font-weight:600;color:#1C1C1E;margin-bottom:8px;display:block}
    .btn-secondary{background:white;color:#F4698A;border:2px solid #F4698A}
    h2{font-size:28px;font-weight:800;color:#1C1C1E;margin-bottom:16px}
    .inviter-name{font-size:22px;font-weight:800;color:#F4698A;margin:16px 0}
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="spinner"></div>
  <p style="margin-top:20px">Verifying invitation...</p>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const app = document.getElementById('app');

  console.log('Token from URL:', token);

  async function verifyInvitation() {
    if (!token) {
      app.innerHTML = `
        <div style="font-size:64px">❌</div>
        <h2>Invalid Link</h2>
        <div class="error">No invitation token found</div>
        <button onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Go Home</button>
      `;
      return;
    }

    try {
      // Check invitation
      const { data, error } = await sb
        .from('invitations')
        .select('*')
        .eq('token', token)
        .eq('status', 'pending')
        .single();

      console.log('Invitation data:', data);
      console.log('Error:', error);

      if (error || !data) {
        app.innerHTML = `
          <div style="font-size:64px">❌</div>
          <h2>Invalid Invitation</h2>
          <div class="error">This invitation link is invalid or has expired</div>
          <button onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Go Home</button>
        `;
        return;
      }

      // Check if user already exists
      const { data: existingUser } = await sb
        .from('profiles')
        .select('id, email')
        .eq('email', data.invited_email)
        .maybeSingle();

      if (existingUser) {
        // User exists - show login/success message
        app.innerHTML = `
          <div style="font-size:64px">🎉</div>
          <h2>Welcome Back!</h2>
          <div class="success">
            You've been connected to ${data.inviter_name || 'your care team'}!
          </div>
          <button onclick="window.location.href='doulalink://app'">Open App</button>
          <button class="btn-secondary" style="margin-top:12px" onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Continue to Web</button>
        `;
        
        // Mark invitation as accepted
        await sb.from('invitations').update({ status: 'accepted' }).eq('id', data.id);
      } else {
        // New user - show signup form
        app.innerHTML = `
          <div style="font-size:64px">✨</div>
          <h2>Create Your Account</h2>
          <div class="inviter-name">${data.inviter_name || 'Someone'}</div>
          <p style="margin-bottom:24px">invited you to join their care team</p>
          
          <div class="field">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="First name" value="${data.invited_name?.split(' ')[0] || ''}">
          </div>
          
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Last name" value="${data.invited_name?.split(' ').slice(1).join(' ') || ''}">
          </div>
          
          <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="Email" value="${data.invited_email}" readonly style="background:#f5f5f5">
          </div>
          
          <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password">
          </div>
          
          <button id="signupBtn">Create Account & Accept Invitation</button>
          <button class="btn-secondary" style="margin-top:12px" onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Cancel</button>
        `;
        
        document.getElementById('signupBtn').onclick = async () => {
          const firstName = document.getElementById('firstName').value;
          const lastName = document.getElementById('lastName').value;
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          
          if (!firstName || !lastName || !password) {
            alert('Please fill all fields');
            return;
          }
          
          const btn = document.getElementById('signupBtn');
          btn.disabled = true;
          btn.textContent = 'Creating account...';
          
          try {
            // Sign up user
            const { data: authData, error: signUpError } = await sb.auth.signUp({
              email: email,
              password: password,
              options: {
                data: {
                  first_name: firstName,
                  last_name: lastName,
                  role: data.type === 'professional' ? 'professional' : 'parent'
                }
              }
            });
            
            if (signUpError) throw signUpError;
            
            // Create profile
            const { error: profileError } = await sb
              .from('profiles')
              .insert({
                id: authData.user.id,
                email: email,
                first_name: firstName,
                last_name: lastName,
                role: data.type === 'professional' ? 'professional' : 'parent'
              });
            
            if (profileError) throw profileError;
            
            // Mark invitation as accepted
            await sb.from('invitations').update({ 
              status: 'accepted',
              invited_user_id: authData.user.id
            }).eq('id', data.id);
            
            app.innerHTML = `
              <div style="font-size:64px">🎉</div>
              <h2>Account Created!</h2>
              <div class="success">
                You've been successfully connected to ${data.inviter_name}!
              </div>
              <button onclick="window.location.href='doulalink://app'">Open App</button>
              <button class="btn-secondary" style="margin-top:12px" onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Continue to Web</button>
            `;
          } catch (err) {
            alert('Error: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'Create Account & Accept Invitation';
          }
        };
      }
      
    } catch (err) {
      console.error('Error:', err);
      app.innerHTML = `
        <div style="font-size:64px">❌</div>
        <h2>Error</h2>
        <div class="error">Something went wrong: ${err.message}</div>
        <button onclick="window.location.href='https://doulalink.doulalink-web.workers.dev'">Go Home</button>
      `;
    }
  }
  
  // Start verification
  verifyInvitation();
</script>
</body>
</html>
