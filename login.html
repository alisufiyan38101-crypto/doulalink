<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #F4698A; --rose-dark: #e05578; --rose-pale: #FFF0F4;
      --bg: #FFF0F4; --ink: #1C1C1E; --sub: #555558; --muted: #9A9AA0;
      --border: #EDE0E4; --input-bg: #F7F0F2; --white: #ffffff;
    }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .top-logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px;
    }
    .logo-circle {
      width: 64px; height: 64px; background: var(--rose); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; box-shadow: 0 8px 24px rgba(244,105,138,.35);
    }
    .logo-circle svg { width: 30px; height: 30px; fill: #fff; }
    .logo-name { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -.4px; }
    .logo-tagline { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .card {
      background: var(--white); border-radius: 28px;
      box-shadow: 0 8px 40px rgba(244,105,138,.10), 0 2px 8px rgba(0,0,0,.04);
      width: 100%; max-width: 400px; padding: 32px 28px 36px;
    }
    .card-title { font-size: 24px; font-weight: 800; color: var(--ink); text-align: center; margin-bottom: 6px; }
    .card-sub   { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 24px; }
    .error-box {
      background: #FFF0F2; border: 1.5px solid rgba(244,105,138,.35);
      border-radius: 14px; padding: 12px 14px; font-size: 13.5px; color: #c0392b;
      margin-bottom: 18px; display: none;
    }
    .error-box.show { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .input-wrap {
      display: flex; align-items: center;
      background: var(--input-bg); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 0 16px; height: 52px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,105,138,.12); background: #fff;
    }
    .input-wrap svg {
      width: 18px; height: 18px; stroke: var(--muted); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; margin-right: 10px;
    }
    .input-wrap input {
      flex: 1; min-width: 0; border: none; background: transparent;
      font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--ink); outline: none;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .eye-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; line-height: 0; flex-shrink: 0; }
    .eye-btn:hover { color: var(--rose); }
    .eye-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .btn-primary {
      width: 100%; height: 54px; background: var(--rose); color: #fff;
      border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(244,105,138,.4); margin-top: 4px;
      transition: background .2s, transform .15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--rose-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 13px; color: var(--muted); }
    .btn-outline {
      width: 100%; height: 54px; background: transparent; color: var(--rose);
      border: 2px solid var(--rose); border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; transition: background .2s, transform .15s;
    }
    .btn-outline:hover { background: var(--rose-pale); transform: translateY(-1px); }
    .invite-banner {
      background: var(--rose-pale); border: 1.5px solid rgba(244,105,138,.25);
      border-radius: 16px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: var(--sub); line-height: 1.5; text-align: center;
    }
    .invite-banner strong { color: var(--rose); }
  </style>
</head>
<body>

  <div class="top-logo">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div class="logo-name">DoulaLink</div>
    <div class="logo-tagline">compassion · community · connection</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome Back 👋</div>
    <div class="card-sub" id="card-sub">Sign in to your account</div>

    <!-- Shown only when coming from an invite -->
    <div class="invite-banner" id="invite-banner" style="display:none;">
      🔗 Sign in to <strong>accept your invitation</strong> and connect automatically.
    </div>

    <div class="error-box" id="err-box"></div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        <button class="eye-btn" type="button" onclick="toggleEye()">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span id="btn-label">Sign In</span>
      <div class="btn-spinner" id="btn-spinner"></div>
    </button>

    <div class="divider"><span>don't have an account?</span></div>

    <a href="signup.html" class="btn-outline">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Create Account
    </a>
  </div>

<script>
  const SUPABASE_URL  = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams    = new URLSearchParams(window.location.search);
  const inviteToken  = urlParams.get('invite_token');
  const prefillEmail = urlParams.get('email');

  // Prefill email if passed from invite
  if (prefillEmail) {
    document.getElementById('email').value = decodeURIComponent(prefillEmail);
    document.getElementById('email').readOnly = true;
  }

  // Show invite banner if coming from invite flow
  if (inviteToken) {
    document.getElementById('invite-banner').style.display = 'block';
    document.getElementById('card-sub').textContent = 'Sign in to accept your invitation';
  }

  function toggleEye() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    const box = document.getElementById('err-box');
    box.textContent = msg;
    box.classList.add('show');
  }

  function hideError() {
    document.getElementById('err-box').classList.remove('show');
  }

  function setLoading(on) {
    document.getElementById('login-btn').disabled = on;
    document.getElementById('btn-label').style.display  = on ? 'none'  : 'inline';
    document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
  }

  /* ── Accept invite after login ── */
  async function handleInviteAccept(loggedInUserId, token) {
    const { data: invite } = await sb
      .from('invitations')
      .select('*')
      .eq('token', token)
      .maybeSingle();

    if (!invite) { console.warn('Invite not found'); return; }
    if (invite.status !== 'pending') { console.warn('Invite already used'); return; }

    // Get inviter's profile ID
    const { data: inviterProfile } = await sb
      .from('profiles')
      .select('id')
      .eq('email', invite.inviter_email)
      .maybeSingle();

    // Mark invite accepted
    await sb.from('invitations')
      .update({ status: 'accepted', updated_at: new Date().toISOString() })
      .eq('id', invite.id);

    // Create connection
    const inviterUserId = inviterProfile?.id;
    if (inviterUserId && loggedInUserId !== inviterUserId) {
      const [userA, userB] = loggedInUserId < inviterUserId
        ? [loggedInUserId, inviterUserId]
        : [inviterUserId, loggedInUserId];

      const { data: existing } = await sb
        .from('connected_users')
        .select('id')
        .eq('user_a', userA)
        .eq('user_b', userB)
        .maybeSingle();

      if (!existing) {
        await sb.from('connected_users').insert({
          user_a: userA,
          user_b: userB,
          connected_at: new Date().toISOString()
        });
        console.log('Connection created ✅');
      } else {
        console.log('Connection already exists');
      }
    }
  }

  /* ── Main login handler ── */
  async function handleLogin() {
    hideError();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) throw error;

      // If invite token present — accept it
      if (inviteToken && data.user) {
        await handleInviteAccept(data.user.id, inviteToken);
      }

      // Redirect
      window.location.href = '/';

    } catch (err) {
      console.error('Login error:', err);
      showError(err.message || 'Sign in failed. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
