<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DoulaLink — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #F4698A; --rose-dark: #e05578; --rose-pale: #FFF0F4;
      --bg: #FFF0F4; --ink: #1C1C1E; --sub: #555558; --muted: #9A9AA0;
      --border: #EDE0E4; --input-bg: #F7F0F2; --white: #ffffff;
    }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: var(--white); border-radius: 32px;
      box-shadow: 0 20px 60px rgba(244,105,138,0.15);
      width: 100%; max-width: 400px; padding: 40px 32px;
      animation: fadeIn .5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 32px; font-weight: 800; color: var(--rose); }
    .logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .input-wrap {
      display: flex; align-items: center; background: var(--input-bg);
      border: 1.5px solid var(--border); border-radius: 16px;
      padding: 0 16px; height: 52px; transition: all 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,105,138,0.1); background: white; }
    .input-wrap svg { width: 20px; height: 20px; stroke: var(--muted); margin-right: 12px; flex-shrink: 0; }
    .input-wrap input { flex: 1; border: none; background: transparent; font-size: 15px; font-family: 'Nunito', sans-serif; outline: none; }
    .input-wrap input::placeholder { color: var(--muted); }
    .eye-btn { background: none; border: none; cursor: pointer; padding: 4px; line-height: 0; }
    .eye-btn svg { width: 18px; height: 18px; stroke: var(--muted); margin-right: 0; }
    .error-box {
      background: #FFF0F2; border: 1.5px solid rgba(244,105,138,0.35);
      border-radius: 14px; padding: 12px 14px; font-size: 13px; color: #c0392b;
      margin-bottom: 20px; display: none; align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .btn-primary {
      width: 100%; height: 54px; background: var(--rose); color: white;
      border: none; border-radius: 50px; font-size: 16px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; box-shadow: 0 6px 20px rgba(244,105,138,0.4);
      transition: transform 0.15s, background 0.2s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--rose-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { text-align: center; margin: 24px 0; position: relative; font-size: 13px; color: var(--muted); }
    .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
    .divider span { background: white; padding: 0 16px; position: relative; }
    .btn-outline {
      width: 100%; height: 54px; background: transparent; color: var(--rose);
      border: 2px solid var(--rose); border-radius: 50px; font-size: 16px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; text-decoration: none; transition: background 0.2s;
    }
    .btn-outline:hover { background: var(--rose-pale); }
    .success-box {
      background: #E8F8F0; border: 1.5px solid #34C75940;
      border-radius: 14px; padding: 16px; margin-bottom: 20px;
      display: none; align-items: center; gap: 12px;
    }
    .success-box.show { display: flex; }
    .success-box svg { flex-shrink: 0; }
    .success-content { flex: 1; }
    .success-title { font-weight: 800; color: #2e7d32; margin-bottom: 4px; }
    .success-text { font-size: 13px; color: #2e7d32; }
    .invite-badge {
      background: var(--rose-pale); border-radius: 12px;
      padding: 12px; margin-bottom: 16px; cursor: pointer;
      transition: transform 0.15s;
    }
    .invite-badge:hover { transform: translateX(4px); }
    .invite-title { font-weight: 700; color: var(--rose); margin-bottom: 4px; }
    .invite-text { font-size: 12px; color: var(--sub); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>DoulaLink</h1>
    <p>compassion · community · connection</p>
  </div>

  <div class="error-box" id="errorBox">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorMsg"></span>
  </div>

  <div class="success-box" id="successBox">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <div class="success-content">
      <div class="success-title" id="successTitle">Welcome back!</div>
      <div class="success-text" id="successText"></div>
    </div>
  </div>

  <div id="pendingInvites" style="display: none;"></div>

  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="eye-btn" type="button" onclick="togglePassword()">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
    <span id="btnLabel">Sign In</span>
    <div class="btn-spinner" id="btnSpinner"></div>
  </button>

  <div class="divider"><span>New to DoulaLink?</span></div>

  <a href="signup.html" class="btn-outline">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    Create Account
  </a>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let pendingInvitations = [];

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function showError(message) {
    document.getElementById('errorMsg').textContent = message;
    document.getElementById('errorBox').classList.add('show');
    setTimeout(() => {
      document.getElementById('errorBox').classList.remove('show');
    }, 5000);
  }

  function hideError() {
    document.getElementById('errorBox').classList.remove('show');
  }

  function showSuccess(title, message) {
    document.getElementById('successTitle').textContent = title;
    document.getElementById('successText').textContent = message;
    document.getElementById('successBox').classList.add('show');
    setTimeout(() => {
      document.getElementById('successBox').classList.remove('show');
    }, 4000);
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = loading;
    document.getElementById('btnLabel').style.display = loading ? 'none' : 'inline';
    document.getElementById('btnSpinner').style.display = loading ? 'block' : 'none';
  }

  async function checkPendingInvitations(userId, userEmail) {
    const { data: invites, error } = await sb
      .from('invitations')
      .select('*')
      .eq('invited_email', userEmail)
      .eq('status', 'pending');
    
    if (error) {
      console.error('Error checking invitations:', error);
      return [];
    }
    
    return invites || [];
  }

  async function acceptInvitationAndCreateConnection(invite, currentUserId) {
    // Get inviter's profile ID
    const { data: inviterProfile } = await sb
      .from('profiles')
      .select('id')
      .eq('email', invite.inviter_email)
      .maybeSingle();
    
    if (!inviterProfile) {
      console.error('Inviter profile not found');
      return;
    }
    
    // Update invitation status
    await sb
      .from('invitations')
      .update({ status: 'accepted', updated_at: new Date().toISOString() })
      .eq('id', invite.id);
    
    // Create connection in connected_users table
    const [userA, userB] = [inviterProfile.id, currentUserId].sort();
    
    const { error: connectionError } = await sb
      .from('connected_users')
      .upsert({
        user_a: userA,
        user_b: userB,
        connected_at: new Date().toISOString()
      }, { onConflict: 'user_a,user_b' });
    
    if (connectionError) {
      console.error('Error creating connection:', connectionError);
    } else {
      console.log('✅ Connection created between users');
      showSuccess('Connected!', `You are now connected with ${invite.inviter_name}`);
    }
  }

  async function handleLogin() {
    hideError();
    
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
      showError('Please enter both email and password');
      return;
    }
    
    setLoading(true);
    
    try {
      const { data, error } = await sb.auth.signInWithPassword({
        email: email,
        password: password
      });
      
      if (error) throw error;
      
      if (data.user) {
        // Check for pending invitations
        const pendingInvites = await checkPendingInvitations(data.user.id, email);
        
        if (pendingInvites.length > 0) {
          showSuccess('Invitations Found!', `You have ${pendingInvites.length} pending invitation(s). Accepting now...`);
          
          // Accept all pending invitations
          for (const invite of pendingInvites) {
            await acceptInvitationAndCreateConnection(invite, data.user.id);
          }
        }
        
        showSuccess('Welcome back!', `Logged in as ${data.user.email}`);
        
        // Redirect to app
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
      
    } catch (err) {
      console.error('Login error:', err);
      let errorMsg = err.message || 'Login failed';
      if (errorMsg.includes('Invalid login')) {
        errorMsg = 'Invalid email or password. Please try again.';
      } else if (errorMsg.includes('Email not confirmed')) {
        errorMsg = 'Please verify your email before logging in. Check your inbox.';
      }
      showError(errorMsg);
    } finally {
      setLoading(false);
    }
  }
  
  // Auto-fill email from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const preEmail = urlParams.get('email');
  if (preEmail) {
    document.getElementById('email').value = decodeURIComponent(preEmail);
  }
  
  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
