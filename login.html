<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DoulaLink</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#FFF0F4;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .card{background:white;max-width:400px;width:100%;padding:40px 32px;border-radius:32px;text-align:center}
    .error{background:#FFEBEE;color:#c0392b;padding:12px;border-radius:14px;margin:16px 0}
    .field{margin-bottom:16px;text-align:left}
    label{display:block;margin-bottom:6px;font-weight:600}
    input{width:100%;padding:14px;border:1.5px solid #EDE0E4;border-radius:14px;font-size:15px;background:#F7F0F2}
    input:focus{outline:none;border-color:#F4698A;background:white}
    button{width:100%;padding:16px;background:#F4698A;color:white;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}
    .spinner{width:24px;height:24px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <h2>Welcome Back 👋</h2>
  <p style="color:#666; margin-bottom:24px;">Sign in to accept your invitation</p>

  <div id="errorMsg" class="error" style="display:none;"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>

  <button id="loginBtn">Sign In →</button>
</div>

<script>
  const SUPABASE_URL = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const urlParams = new URLSearchParams(window.location.search);
  const redirectToken = urlParams.get('redirect_token');
  const prefillEmail = urlParams.get('email');
  if (prefillEmail) document.getElementById('email').value = decodeURIComponent(prefillEmail);

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');

    if (!email || !password) {
      errorDiv.textContent = 'Please enter email and password';
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
      return;
    }

    // If coming from invite, accept it
    if (redirectToken) {
      await sb.from('invites')
        .update({ accepted_at: new Date().toISOString(), accepted_by: data.user?.id })
        .eq('token', redirectToken);
    }

    // Redirect to home
    window.location.href = '/';
  }

  document.getElementById('loginBtn').onclick = handleLogin;
  document.getElementById('password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
