<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DoulaLink — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #F4698A; --rose-dark: #e05578; --rose-pale: #FFF0F4;
      --bg: #FFF0F4; --ink: #1C1C1E; --sub: #555558; --muted: #9A9AA0;
      --border: #EDE0E4; --input-bg: #F7F0F2; --white: #ffffff;
    }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: var(--white); border-radius: 32px;
      box-shadow: 0 20px 60px rgba(244,105,138,0.15);
      width: 100%; max-width: 400px; padding: 40px 32px;
      animation: fadeIn .5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 32px; font-weight: 800; color: var(--rose); }
    .logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .input-wrap {
      display: flex; align-items: center; background: var(--input-bg);
      border: 1.5px solid var(--border); border-radius: 16px;
      padding: 0 16px; height: 52px; transition: all 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,105,138,0.1); background: white; }
    .input-wrap svg { width: 20px; height: 20px; stroke: var(--muted); margin-right: 12px; flex-shrink: 0; }
    .input-wrap input { flex: 1; border: none; background: transparent; font-size: 15px; font-family: 'Nunito', sans-serif; outline: none; }
    .input-wrap input::placeholder { color: var(--muted); }
    .eye-btn { background: none; border: none; cursor: pointer; padding: 4px; line-height: 0; }
    .eye-btn svg { width: 18px; height: 18px; stroke: var(--muted); margin-right: 0; }
    .error-box {
      background: #FFF0F2; border: 1.5px solid rgba(244,105,138,0.35);
      border-radius: 14px; padding: 12px 14px; font-size: 13px; color: #c0392b;
      margin-bottom: 20px; display: none; align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .btn-primary {
      width: 100%; height: 54px; background: var(--rose); color: white;
      border: none; border-radius: 50px; font-size: 16px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; box-shadow: 0 6px 20px rgba(244,105,138,0.4);
      transition: transform 0.15s, background 0.2s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--rose-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { text-align: center; margin: 24px 0; position: relative; font-size: 13px; color: var(--muted); }
    .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
    .divider span { background: white; padding: 0 16px; position: relative; }
    .btn-outline {
      width: 100%; height: 54px; background: transparent; color: var(--rose);
      border: 2px solid var(--rose); border-radius: 50px; font-size: 16px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; text-decoration: none; transition: background 0.2s;
    }
    .btn-outline:hover { background: var(--rose-pale); }
    .success-box {
      background: #E8F8F0; border: 1.5px solid #34C75940;
      border-radius: 14px; padding: 16px; margin-bottom: 20px;
      display: none; align-items: center; gap: 12px;
    }
    .success-box.show { display: flex; }
    .success-box svg { flex-shrink: 0; }
    .success-content { flex: 1; }
    .success-title { font-weight: 800; color: #2e7d32; margin-bottom: 4px; }
    .success-text { font-size: 13px; color: #2e7d32; }
    .invite-badge {
      background: var(--rose-pale); border-radius: 12px;
      padding: 12px; margin-bottom: 16px; cursor: pointer;
      transition: transform 0.15s;
    }
    .invite-badge:hover { transform: translateX(4px); }
    .invite-title { font-weight: 700; color: var(--rose); margin-bottom: 4px; }
    .invite-text { font-size: 12px; color: var(--sub); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>DoulaLink</h1>
    <p>compassion · community · connection</p>
  </div>

  <div class="error-box" id="errorBox">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorMsg"></span>
  </div>

  <div class="success-box" id="successBox">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <div class="success-content">
      <div class="success-title" id="successTitle">Welcome back!</div>
      <div class="success-text" id="successText"></div>
    </div>
  </div>

  <div id="pendingInvites" style="display: none;"></div>

  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="eye-btn" type="button" onclick="togglePassword()">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
    <span id="btnLabel">Sign In</span>
    <div class="btn-spinner" id="btnSpinner"></div>
  </button>

  <div class="divider"><span>New to DoulaLink?</span></div>

  <a href="signup.html" class="btn-outline">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    Create Account
  </a>
</div>
