<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoulaLink — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #F4698A;
      --rose-dark: #e05578;
      --rose-pale: #FFF0F4;
      --bg: #FFF0F4;
      --ink: #1C1C1E;
      --sub: #555558;
      --muted: #9A9AA0;
      --border: #EDE0E4;
      --input-bg: #F7F0F2;
      --white: #ffffff;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 20px 40px;
    }

    .top-logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px; animation: fadeDown .5s ease both;
    }
    .logo-circle {
      width: 64px; height: 64px; background: var(--rose); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; box-shadow: 0 8px 24px rgba(244,105,138,.35);
    }
    .logo-circle svg { width: 30px; height: 30px; fill: #fff; }
    .logo-name { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -.4px; }
    .logo-tagline { font-size: 13px; color: var(--muted); margin-top: 3px; letter-spacing: .2px; }

    .card {
      background: var(--white); border-radius: 28px;
      box-shadow: 0 8px 40px rgba(244,105,138,.10), 0 2px 8px rgba(0,0,0,.04);
      width: 100%; max-width: 400px; padding: 32px 28px 36px;
      animation: riseUp .5s cubic-bezier(.22,1,.36,1) .1s both;
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
    @keyframes riseUp  { from { opacity:0; transform:translateY(24px) scale(.98); } to { opacity:1; transform:none; } }

    .card-heading { font-size: 26px; font-weight: 800; color: var(--ink); margin-bottom: 6px; letter-spacing: -.3px; }
    .card-sub {
      font-size: 13.5px; color: var(--sub);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 28px; padding-left: 12px;
      border-left: 3px solid var(--rose);
    }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .input-wrap {
      display: flex; align-items: center; background: var(--input-bg);
      border: 1.5px solid var(--border); border-radius: 16px;
      padding: 0 16px; height: 52px; transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,105,138,.12); background: #fff;
    }
    .input-wrap svg {
      width: 18px; height: 18px; stroke: var(--muted); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; margin-right: 10px;
    }
    .input-wrap input {
      flex: 1; border: none; background: transparent;
      font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--ink); outline: none;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .eye-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; line-height: 0; transition: color .2s;
    }
    .eye-btn:hover { color: var(--rose); }
    .eye-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .forgot {
      display: block; text-align: right; font-size: 13px; font-weight: 700;
      color: var(--rose); text-decoration: none;
      margin-top: -6px; margin-bottom: 24px; transition: opacity .2s;
    }
    .forgot:hover { opacity: .7; }

    .error-box {
      background: #FFF0F2; border: 1.5px solid rgba(244,105,138,.35);
      border-radius: 14px; padding: 12px 14px; font-size: 13.5px; color: #c0392b;
      margin-bottom: 18px; display: none; align-items: center; gap: 8px;
    }
    .error-box.show { display: flex; animation: shake .3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    .btn-primary {
      width: 100%; height: 54px; background: var(--rose); color: #fff;
      border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: .2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(244,105,138,.4);
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--rose-dark); transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(244,105,138,.48);
    }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 13px; color: var(--muted); }

    .btn-outline {
      width: 100%; height: 54px; background: transparent; color: var(--rose);
      border: 2px solid var(--rose); border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: .2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; transition: background .2s, color .2s, transform .15s;
    }
    .btn-outline:hover { background: var(--rose-pale); transform: translateY(-1px); }

    .footer-note {
      margin-top: 24px; font-size: 13px; color: var(--muted);
      text-align: center; animation: fadeDown .5s ease .4s both;
    }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: #fff; padding: 12px 24px; border-radius: 40px;
      font-size: 14px; font-weight: 700; box-shadow: 0 8px 28px rgba(0,0,0,.2);
      transition: transform .4s cubic-bezier(.22,1,.36,1); z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      body { padding: 36px 16px 32px; }
      .card { padding: 26px 20px 30px; }
    }
  </style>
</head>
<body>

  <div class="top-logo">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div class="logo-name">DoulaLink</div>
    <div class="logo-tagline">compassion · community · connection</div>
  </div>

  <div class="card">
    <div class="card-heading">Welcome back</div>
    <div class="card-sub">Sign in to continue your care journey</div>

    <div class="error-box" id="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg"></span>
    </div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        <button class="eye-btn" type="button" onclick="toggleEye()">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <a href="reset-password.html" class="forgot">Forgot password?</a>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span id="btn-label">Sign In</span>
      <div class="btn-spinner" id="btn-spinner"></div>
    </button>

    <div class="divider"><span>or</span></div>

    <a href="signup.html" class="btn-outline">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Create an Account
    </a>
  </div>

  <div class="footer-note">Your care journey starts here 💛</div>
  <div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL  = 'https://bwohpddanrdfaxwkbgoa.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2hwZGRhbnJkZmF4d2tiZ29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTk1MjgsImV4cCI6MjA4ODc5NTUyOH0.YOzp7mJR6FcwZ2dgVfqXDuNfVPudV6ijCFvhUbDG6wY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Auto-fill email if redirected from signup
  const urlParams = new URLSearchParams(window.location.search);
  const prefillEmail = urlParams.get('email');
  if (prefillEmail) document.getElementById('email').value = decodeURIComponent(prefillEmail);

  function toggleEye() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-box').classList.add('show');
  }
  function hideError() { document.getElementById('error-box').classList.remove('show'); }
  function setLoading(on) {
    document.getElementById('login-btn').disabled = on;
    document.getElementById('btn-label').style.display = on ? 'none' : 'inline';
    document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function handleLogin() {
    hideError();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const pw    = document.getElementById('password').value;
    if (!email || !pw) { showError('Please enter your email and password.'); return; }
    setLoading(true);

    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    setLoading(false);
    if (error) { showError(error.message); return; }

    // ✅ Correct deep link scheme: doulalink://
    window.location.href = 'doulalink://login-success';
    setTimeout(() => {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.doulalink.app';
    }, 2000);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
