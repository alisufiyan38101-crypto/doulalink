<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DoulaLink — Create Account</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --rose:#F4698A;
  --rose-dark:#e05578;
  --bg:#FFF0F4;
  --border:#EDE0E4;
  --input-bg:#F7F0F2;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:40px 16px;
  overflow-x:hidden;
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:24px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* ROLE */
.role-options{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.role-card{
  flex:1;
  border:2px solid var(--border);
  border-radius:16px;
  padding:12px;
  text-align:center;
  cursor:pointer;
  position:relative;
}

.role-card.selected{
  border-color:var(--rose);
  background:#FFF0F4;
}

.role-card.selected::after{
  content:"✓";
  position:absolute;
  top:6px;
  right:10px;
  color:var(--rose);
}

/* INPUT */
.field{margin-bottom:14px}

.input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--input-bg);
  outline:none;
}

.input:focus{
  border-color:var(--rose);
  background:#fff;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:40px;
  background:var(--rose);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.btn:disabled{
  opacity:0.6;
  cursor:progress;
}

/* PASSWORD BAR */
.bar{display:flex;gap:5px;margin-top:6px}
.seg{flex:1;height:4px;background:#ddd;border-radius:2px}
.seg.active{background:var(--rose)}

/* MOBILE */
@media(max-width:480px){
  .role-options{flex-direction:column}
}
</style>
</head>

<body>

<div class="card">

<h2>Create Account</h2>

<!-- ROLE -->
<div class="role-options">
  <div class="role-card selected" data-role="parent">Parent</div>
  <div class="role-card" data-role="professional">Professional</div>
</div>

<!-- NAME -->
<input class="input" id="fname" placeholder="First Name">
<input class="input" id="lname" placeholder="Last Name">

<!-- EMAIL -->
<input class="input" id="email" placeholder="Email">

<!-- PASSWORD -->
<input class="input" id="pw" type="password" placeholder="Password">

<div class="bar">
  <div class="seg" id="s1"></div>
  <div class="seg" id="s2"></div>
  <div class="seg" id="s3"></div>
  <div class="seg" id="s4"></div>
</div>

<input class="input" id="pw2" type="password" placeholder="Confirm Password">

<button class="btn" onclick="signup()" id="btn">Create Account</button>

<p id="msg" style="margin-top:10px;color:red;"></p>

</div>

<script>
const sb = supabase.createClient(
  "https://bwohpddanrdfaxwkbgoa.supabase.co",
  "YOUR_ANON_KEY"
);

let role="parent";

// role select
document.querySelectorAll(".role-card").forEach(card=>{
  card.onclick=()=>{
    document.querySelectorAll(".role-card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    role=card.dataset.role;
  }
});

// password strength
document.getElementById("pw").addEventListener("input",()=>{
  let pw=document.getElementById("pw").value;
  let s=0;

  if(pw.length>=8)s++;
  if(/[A-Z]/.test(pw))s++;
  if(/[0-9]/.test(pw))s++;
  if(/[^A-Za-z0-9]/.test(pw))s++;

  ["s1","s2","s3","s4"].forEach((id,i)=>{
    document.getElementById(id).classList.toggle("active",i<s);
  });
});

// signup
async function signup(){
  let fname=fnameEl.value.trim();
  let lname=lnameEl.value.trim();
  let email=emailEl.value.trim();
  let pw=pwEl.value;
  let pw2=pw2El.value;

  if(!fname||!lname||!email||!pw){
    msg.innerText="Fill all fields";
    return;
  }

  if(pw!==pw2){
    msg.innerText="Passwords do not match";
    return;
  }

  btn.disabled=true;

  const {error}=await sb.auth.signUp({
    email,
    password:pw,
    options:{
      data:{
        first_name:fname,
        last_name:lname,
        role:role
      }
    }
  });

  btn.disabled=false;

  if(error){
    msg.innerText=error.message;
  }else{
    msg.style.color="green";
    msg.innerText="Check your email to verify!";
    
    setTimeout(()=>{
      window.location.href="login.html";
    },3000);
  }
}

// shortcuts
const fnameEl=document.getElementById("fname");
const lnameEl=document.getElementById("lname");
const emailEl=document.getElementById("email");
const pwEl=document.getElementById("pw");
const pw2El=document.getElementById("pw2");
const msg=document.getElementById("msg");
const btn=document.getElementById("btn");
</script>

</body>
</html>
